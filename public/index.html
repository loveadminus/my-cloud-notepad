<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端私密记事本 Pro (防崩溃版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-size: 19px; }
        .panel-large-text { font-size: 16px !important; font-weight: 800 !important; }
        .sync-btn-font { font-size: 16px !important; font-weight: 900 !important; }
        .md-preview h1 { font-size: 2.6rem; font-weight: 800; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.3em; margin-top: 1.6rem; margin-bottom: 1rem; color: #0f172a; }
        .md-preview h2 { font-size: 2.1rem; font-weight: 700; border-bottom: 1px solid #edf2f7; padding-bottom: 0.3em; margin-top: 1.4rem; margin-bottom: 0.8rem; color: #1e293b; }
        .md-preview p, .md-preview div { margin-bottom: 0.6rem; line-height: 1.2; color: #334155; font-size: 15px; }
        .resizer { width: 6px; cursor: col-resize; background-color: #e2e8f0; transition: background-color 0.2; position: relative; z-index: 10; }
        .resizer:hover, .resizer.resizing { background-color: #2563eb; width: 6px; }
        .no-select { user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    </style>
</head>
<body class="bg-slate-900 font-sans h-screen flex flex-col overflow-hidden text-slate-800">

    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 flex flex-col gap-4">
            <h2 class="text-2xl font-black mb-2 text-center text-slate-800" id="auth-title">登入云端工作台</h2>
            
            <div id="auth-error" class="hidden bg-red-100 text-red-600 p-2 rounded text-sm font-bold text-center break-all"></div>
            
            <input type="text" id="auth-username" placeholder="请输入账号" class="w-full border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-blue-500 transition-colors font-bold text-slate-700">
            <input type="password" id="auth-password" placeholder="请输入密码" class="w-full border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-blue-500 transition-colors font-bold text-slate-700">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-md transition-all mt-2">登入</button>
            <div class="text-center text-sm font-bold text-slate-500 cursor-pointer hover:text-blue-600 transition-colors mt-2" onclick="toggleAuthMode()" id="auth-toggle">没有账号？点击注册新账号</div>
        </div>
    </div>

    <header class="bg-slate-800 text-slate-200 py-1.5 px-6 flex items-center justify-between flex-shrink-0 select-none shadow-md">
        <div class="flex items-center gap-3 z-10"><button onclick="logout()" class="text-slate-300 hover:text-white font-bold text-sm transition-colors"><i class="fa-solid fa-right-from-bracket"></i> 退出/重载</button></div>
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 font-black tracking-wider text-xl text-white">云端私密记事本</div>
        <div class="flex items-center gap-5 z-10"></div>
    </header>
    <div id="workspace-container" class="flex flex-1 overflow-hidden w-full bg-slate-200 p-8 items-center justify-center">
        <div class="text-center text-slate-500 font-bold text-xl">登入成功后，这里将加载您的云端数据。<br>（如果您能看到这句话且没有登录框，说明已经登录！）</div>
    </div>

    <script>
        // === 1. 致命错误拦截器：直接将报错显示在网页上 ===
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errDiv = document.getElementById('auth-error');
            if(errDiv) {
                errDiv.innerText = "页面报错拦截: " + msg;
                errDiv.classList.remove('hidden');
            }
            return false;
        };

        // === 2. 安全读取本地存储 (防止隐私模式或拦截工具导致JS崩溃) ===
        let isLoginMode = true;
        let cfUser = null;
        let cfPass = null;
        
        try {
            cfUser = localStorage.getItem('cfUser');
            cfPass = localStorage.getItem('cfPass');
        } catch(e) {
            document.getElementById('auth-error').innerText = "警告：浏览器禁止了本地存储，可能处于无痕模式。";
            document.getElementById('auth-error').classList.remove('hidden');
        }

        // === 3. 核心：切换注册/登入模式 ===
        function toggleAuthMode() {
            try {
                isLoginMode = !isLoginMode;
                document.getElementById('auth-title').innerText = isLoginMode ? '登入云端工作台' : '注册新账号';
                document.getElementById('auth-btn').innerText = isLoginMode ? '登入' : '立即注册';
                document.getElementById('auth-toggle').innerText = isLoginMode ? '没有账号？点击注册新账号' : '已有账号？点击返回登入';
                document.getElementById('auth-error').classList.add('hidden');
            } catch(e) {
                alert("切换模式失败: " + e.message);
            }
        }

        // === 4. 发起验证或注册请求 ===
        async function handleAuth() {
            const u = document.getElementById('auth-username').value;
            const p = document.getElementById('auth-password').value;
            const errDiv = document.getElementById('auth-error');
            
            if(!u || !p) { 
                errDiv.innerText = "请输入账号和密码"; 
                errDiv.classList.remove('hidden'); 
                return; 
            }

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            document.getElementById('auth-btn').innerText = "请稍候...";
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await res.json();
                
                if(res.ok && (data.success || isLoginMode)) {
                    try {
                        localStorage.setItem('cfUser', u);
                        localStorage.setItem('cfPass', p);
                    } catch(e) { /* 忽略存储异常 */ }
                    
                    document.getElementById('auth-overlay').classList.add('hidden');
                    alert("验证成功！");
                } else {
                    errDiv.innerText = data.message || "请求被后端拒绝，检查数据库绑定";
                    errDiv.classList.remove('hidden');
                }
            } catch(e) {
                errDiv.innerText = "连接后端 API 失败，是不是 Functions 没生效？ (" + e.message + ")";
                errDiv.classList.remove('hidden');
            }
            document.getElementById('auth-btn').innerText = isLoginMode ? '登入' : '立即注册';
        }

        function logout() {
            try { localStorage.removeItem('cfUser'); localStorage.removeItem('cfPass'); } catch(e){}
            location.reload();
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (cfUser && cfPass) {
                document.getElementById('auth-overlay').classList.add('hidden');
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
